AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: "De-Clickbait \u2014 DynamoDB title cache + SQS processing queue + resolver\
  \ + worker Lambdas"
Parameters:
  TranscriptApiKey:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /de-clickbait/transcript-api-key
  AnthropicApiKey:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /de-clickbait/anthropic-api-key
  ProxyUrl:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /de-clickbait/proxy-url
  FrameVersion:
    Type: String
    Default: '3'
Globals:
  Function:
    Architectures:
    - arm64
    Environment:
      Variables:
        TABLE_NAME:
          Ref: TitlesTable
        QUEUE_URL:
          Ref: ProcessingQueue
Resources:
  TitleApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
        - '*'
        AllowHeaders:
        - content-type
        AllowMethods:
        - GET
        - POST
        - OPTIONS
  TitlesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: de-clickbait-titles
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: videoId
        AttributeType: S
      KeySchema:
      - AttributeName: videoId
        KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
  ThumbnailBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName:
        Fn::Sub: de-clickbait-thumbs-${AWS::AccountId}
      LifecycleConfiguration:
        Rules:
        - Id: expire-frames-180d
          Status: Enabled
          ExpirationInDays: 180
  ThumbnailOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: de-clickbait-thumb-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4
  ThumbnailDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: De-Clickbait thumbnail CDN
        PriceClass: PriceClass_100
        HttpVersion: http2and3
        DefaultCacheBehavior:
          TargetOriginId: thumb-s3
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
          - GET
          - HEAD
          CachedMethods:
          - GET
          - HEAD
          Compress: true
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
        Origins:
        - Id: thumb-s3
          DomainName:
            Fn::GetAtt:
            - ThumbnailBucket
            - RegionalDomainName
          OriginAccessControlId:
            Fn::GetAtt:
            - ThumbnailOAC
            - Id
          S3OriginConfig:
            OriginAccessIdentity: ''
  ThumbnailBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket:
        Ref: ThumbnailBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Sid: AllowCloudFrontOACRead
          Effect: Allow
          Principal:
            Service: cloudfront.amazonaws.com
          Action: s3:GetObject
          Resource:
            Fn::Sub: ${ThumbnailBucket.Arn}/*
          Condition:
            StringEquals:
              AWS:SourceArn:
                Fn::Sub: arn:aws:cloudfront::${AWS::AccountId}:distribution/${ThumbnailDistribution.Id}
  DeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: de-clickbait-dlq
      MessageRetentionPeriod: 1209600
  ProcessingQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: de-clickbait-queue
      VisibilityTimeout: 180
      MessageRetentionPeriod: 86400
      RedrivePolicy:
        deadLetterTargetArn:
          Fn::GetAtt:
          - DeadLetterQueue
          - Arn
        maxReceiveCount: 3
  ThumbnailDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: de-clickbait-thumb-dlq
      MessageRetentionPeriod: 1209600
  ThumbnailQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: de-clickbait-thumb-queue
      VisibilityTimeout: 180
      MessageRetentionPeriod: 86400
      RedrivePolicy:
        deadLetterTargetArn:
          Fn::GetAtt:
          - ThumbnailDeadLetterQueue
          - Arn
        maxReceiveCount: 3
  ResolverFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: de-clickbait-resolver
      CodeUri: ResolverFunction
      Handler: index.handler
      Runtime: nodejs22.x
      Timeout: 10
      MemorySize: 512
      Environment:
        Variables:
          THUMB_QUEUE_URL:
            Ref: ThumbnailQueue
          FRAME_VERSION:
            Ref: FrameVersion
          NODE_OPTIONS: ' --enable-source-maps'
      Policies:
      - DynamoDBReadPolicy:
          TableName:
            Ref: TitlesTable
      - DynamoDBWritePolicy:
          TableName:
            Ref: TitlesTable
      - SQSSendMessagePolicy:
          QueueName:
            Fn::GetAtt:
            - ProcessingQueue
            - QueueName
      - SQSSendMessagePolicy:
          QueueName:
            Fn::GetAtt:
            - ThumbnailQueue
            - QueueName
      Events:
        GetTitle:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: TitleApi
            Path: /title/{videoId}
            Method: GET
        PostTitles:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: TitleApi
            Path: /titles
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
        - index.ts
        External:
        - '@aws-sdk/*'
        Format: cjs
        Minify: false
        Sourcemap: true
        Target: es2022
      SamResourceId: ResolverFunction
  WorkerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: de-clickbait-worker
      CodeUri: WorkerFunction
      Handler: index.handler
      Runtime: nodejs22.x
      Timeout: 120
      MemorySize: 256
      Policies:
      - DynamoDBWritePolicy:
          TableName:
            Ref: TitlesTable
      - SQSPollerPolicy:
          QueueName:
            Fn::GetAtt:
            - ProcessingQueue
            - QueueName
      Environment:
        Variables:
          TRANSCRIPT_API_KEY:
            Ref: TranscriptApiKey
          ANTHROPIC_API_KEY:
            Ref: AnthropicApiKey
          NODE_OPTIONS: ' --enable-source-maps'
      Events:
        SQSTrigger:
          Type: SQS
          Properties:
            Queue:
              Fn::GetAtt:
              - ProcessingQueue
              - Arn
            BatchSize: 1
            FunctionResponseTypes:
            - ReportBatchItemFailures
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
        - index.ts
        External:
        - '@aws-sdk/*'
        Format: cjs
        Minify: false
        Sourcemap: true
        Target: es2022
      SamResourceId: WorkerFunction
  ThumbnailWorkerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: de-clickbait-thumbnail-worker
      PackageType: Image
      Timeout: 120
      MemorySize: 2048
      Environment:
        Variables:
          THUMB_BUCKET:
            Ref: ThumbnailBucket
          THUMB_CDN_DOMAIN:
            Fn::GetAtt:
            - ThumbnailDistribution
            - DomainName
          PROXY_URL:
            Ref: ProxyUrl
          YTDLP_PLAYER_CLIENT: tv_embedded
          MAX_HEIGHT: '720'
          FETCH_BYTES: '200000'
          DARK_YAVG: '16'
          THUMB_ENTROPY_MIN: '5.0'
          FRAME_VERSION:
            Ref: FrameVersion
      Policies:
      - DynamoDBWritePolicy:
          TableName:
            Ref: TitlesTable
      - S3WritePolicy:
          BucketName:
            Ref: ThumbnailBucket
      - SQSPollerPolicy:
          QueueName:
            Fn::GetAtt:
            - ThumbnailQueue
            - QueueName
      Events:
        SQSTrigger:
          Type: SQS
          Properties:
            Queue:
              Fn::GetAtt:
              - ThumbnailQueue
              - Arn
            BatchSize: 1
            ScalingConfig:
              MaximumConcurrency: 5
            FunctionResponseTypes:
            - ReportBatchItemFailures
      ImageUri: thumbnailworkerfunction:latest
    Metadata:
      DockerContext: /Users/rinadlivictor/Documents/projects/yt-clickbait-remover/src/thumbnail-worker
      DockerTag: latest
      Dockerfile: Dockerfile
      SamResourceId: ThumbnailWorkerFunction
Outputs:
  ApiEndpoint:
    Description: "HTTP API base URL \u2014 paste this into the Firefox extension config"
    Value:
      Fn::Sub: https://${TitleApi}.execute-api.${AWS::Region}.amazonaws.com
  TableName:
    Value:
      Ref: TitlesTable
  ThumbnailBucketName:
    Description: S3 bucket holding extracted thumbnail frames
    Value:
      Ref: ThumbnailBucket
  ThumbnailCdnDomain:
    Description: CloudFront domain serving thumbnails (thumbUrl = https://<this>/<videoId>.jpg)
    Value:
      Fn::GetAtt:
      - ThumbnailDistribution
      - DomainName
  QueueUrl:
    Value:
      Ref: ProcessingQueue
  DeadLetterQueueUrl:
    Value:
      Ref: DeadLetterQueue
  ThumbnailQueueUrl:
    Description: Drop a {"videoId":"..."} message here to manually test extraction
    Value:
      Ref: ThumbnailQueue
  ThumbnailDeadLetterQueueUrl:
    Value:
      Ref: ThumbnailDeadLetterQueue
