version = 0.1

[default.deploy.parameters]
stack_name = "de-clickbait"
resolve_s3 = true
s3_prefix = "de-clickbait"
confirm_changeset = true
capabilities = "CAPABILITY_IAM"
disable_rollback = false
# The thumbnail worker is a container-image function; this lets SAM auto-create &
# manage its ECR repo on deploy (otherwise the first deploy errors with no repo).
resolve_image_repos = true
image_repositories = []

[default.global.parameters]
region = "us-west-1"
