AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: De-Clickbait — DynamoDB title cache + SQS processing queue + resolver + worker Lambdas

# Secrets live in SSM Parameter Store as SecureString and are fetched BY THE WORKERS AT
# RUNTIME (cold start only). Only the parameter NAMES pass through this template, so the
# actual values never appear in CloudFormation (DescribeStacks resolves
# AWS::SSM::Parameter::Value params to plaintext!) or as readable Lambda env vars.
# Create/convert them once before deploying:
#   aws ssm put-parameter --name /de-clickbait/transcript-api-key --type SecureString --overwrite --value "YOUR_KEY"
#   aws ssm put-parameter --name /de-clickbait/anthropic-api-key  --type SecureString --overwrite --value "sk-ant-..."
#   aws ssm put-parameter --name /de-clickbait/proxy-url          --type SecureString --overwrite --value "http://user-NAME:PASS@gate.decodo.com:7000"
Parameters:
  # Frame-selection heuristic version. Shared by the thumbnail worker (writes thumbVersion
  # AND embeds it in the S3 object key / thumbUrl, so a bump produces a NEW CDN URL that
  # bypasses the 180d CloudFront/browser cache) AND the resolver (re-enqueues items whose
  # thumbVersion != this, so a bump lazily re-extracts existing thumbnails as they're
  # viewed). Bump when pick logic changes. v3 = entropy-gated blur vote (§16).
  FrameVersion:
    Type: String
    Default: "3"
  # Email for the monthly cost-budget alerts (the backstop that turns API abuse into an
  # email instead of a surprise bill). Empty (default) = no budget resource created; set
  # it via: sam deploy --parameter-overrides BudgetAlertEmail=you@example.com
  # (kept out of samconfig.toml so the address doesn't land in the public repo).
  BudgetAlertEmail:
    Type: String
    Default: ""

Conditions:
  HasBudgetEmail: !Not [!Equals [!Ref BudgetAlertEmail, ""]]

Globals:
  Function:
    # NOTE: Runtime is set per-function (NOT here) because the thumbnail worker is
    # a container Image package, which cannot carry a Runtime property.
    Architectures: [arm64]   # Graviton2 — 20% cheaper; static-ffmpeg + base image are multi-arch
    Environment:
      Variables:
        TABLE_NAME: !Ref TitlesTable
        QUEUE_URL: !Ref ProcessingQueue

# ── API Gateway (HTTP API) ──────────────────────────────────────────────────────
# Defined explicitly so we can attach CORS config (content scripts run on
# youtube.com origin, so the response must include CORS headers).
Resources:
  # NOTE: the public face of this API is https://api.facethevalue.com — an API Gateway
  # custom domain managed OUTSIDE this stack (one-time CLI setup: ACM cert in us-west-1
  # + `apigatewayv2 create-domain-name` + `create-api-mapping` to this API's $default
  # stage; CNAME lives at the domain registrar). Kept out of the template so the cert
  # ARN/account id stay out of the repo and a plain `sam deploy` can never drop it.
  TitleApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      # Stage-wide throttle = a hard ceiling on request rate so a single abuser can't run up
      # unbounded LLM/proxy spend by hammering /titles. HTTP APIs have no API keys/usage plans
      # (REST-only) and WAF per-IP rules don't attach to HTTP APIs, so this global ceiling +
      # the resolver's videoId validation + batch cap are the launch controls. Generous for
      # real traffic (a page load is one batched request); raise if legit usage ever nears it.
      # Per-IP protection (CloudFront+WAF rate rule, or REST migration) is the next step IF abuse
      # actually materializes — see THUMBNAIL_PIPELINE.md "Before launch".
      DefaultRouteSettings:
        ThrottlingRateLimit: 50      # steady-state req/s across ALL callers
        ThrottlingBurstLimit: 100    # short-burst allowance
        DetailedMetricsEnabled: true
      # Access logs (per-request source IP + route + status) so that if abuse ever
      # materializes there's data to design a WAF/per-IP rule from. ~free at this volume.
      AccessLogSettings:
        DestinationArn: !GetAtt ApiAccessLogGroup.Arn
        Format: '{"requestId":"$context.requestId","ip":"$context.identity.sourceIp","requestTime":"$context.requestTime","method":"$context.httpMethod","path":"$context.path","status":"$context.status","responseLength":"$context.responseLength","userAgent":"$context.identity.userAgent"}'
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowHeaders:
          - content-type
        AllowMethods:
          - GET
          - POST
          - OPTIONS

  ApiAccessLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /de-clickbait/api-access
      RetentionInDays: 30

  # Monthly cost ceiling → email at 80% actual and 100% forecasted. Only created when
  # BudgetAlertEmail is set (see Parameters). This is the real abuse backstop: throttles
  # bound the request RATE, this bounds the DOLLARS.
  MonthlyBudget:
    Type: AWS::Budgets::Budget
    Condition: HasBudgetEmail
    Properties:
      Budget:
        BudgetName: de-clickbait-monthly
        BudgetType: COST
        TimeUnit: MONTHLY
        BudgetLimit:
          Amount: 150
          Unit: USD
      NotificationsWithSubscribers:
        - Notification:
            NotificationType: ACTUAL
            ComparisonOperator: GREATER_THAN
            Threshold: 80
            ThresholdType: PERCENTAGE
          Subscribers:
            - SubscriptionType: EMAIL
              Address: !Ref BudgetAlertEmail
        - Notification:
            NotificationType: FORECASTED
            ComparisonOperator: GREATER_THAN
            Threshold: 100
            ThresholdType: PERCENTAGE
          Subscribers:
            - SubscriptionType: EMAIL
              Address: !Ref BudgetAlertEmail

  # ── DynamoDB ──────────────────────────────────────────────────────────────────
  TitlesTable:
    Type: AWS::DynamoDB::Table
    # "Keep data forever" (§6) must survive an accidental `sam delete` / resource-replacing
    # update too — this table holds every paid-for title, not just a cache.
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: de-clickbait-titles
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: videoId
          AttributeType: S
      KeySchema:
        - AttributeName: videoId
          KeyType: HASH
      # No TimeToLive: cached titles/frames never go stale, so we keep them
      # indefinitely (storage is trivial). Items are only ever overwritten, not
      # auto-expired. (Removed 2026-06-30; workers no longer write a `ttl` attr.)

  # ── S3 (extracted thumbnail frames) ───────────────────────────────────────────
  # Worker extracts a frame at an arbitrary timestamp, encodes to ~40KB JPEG,
  # and stores it here as <videoId>.jpg. DynamoDB item carries the resulting URL.
  # No lifecycle expiration: frames never go stale and storage is cheap, so we
  # keep them indefinitely (kept in sync with the table, which also no longer
  # auto-expires). Objects are only overwritten on re-extraction.
  ThumbnailBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub "de-clickbait-thumbs-${AWS::AccountId}"

  # ── CloudFront serving layer (thumbnail CDN) ──────────────────────────────────
  # The bucket stays PRIVATE; CloudFront reads it via Origin Access Control (OAC).
  # Browser <img> loads the frame from the CDN domain (edge-cached, cheaper egress
  # than serving S3 directly). The worker writes this domain into thumbUrl.
  # NOTE: first deploy of the distribution takes ~15-20 min to propagate.
  ThumbnailOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: de-clickbait-thumb-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  ThumbnailDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: De-Clickbait thumbnail CDN
        PriceClass: PriceClass_100        # NA + EU edges only — cheapest, fits a US audience
        HttpVersion: http2and3
        DefaultCacheBehavior:
          TargetOriginId: thumb-s3
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD]
          CachedMethods: [GET, HEAD]
          Compress: true
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6   # Managed-CachingOptimized
        Origins:
          - Id: thumb-s3
            DomainName: !GetAtt ThumbnailBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt ThumbnailOAC.Id
            S3OriginConfig:
              OriginAccessIdentity: ""

  # Lets only THIS CloudFront distribution read the (otherwise private) bucket.
  ThumbnailBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ThumbnailBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontOACRead
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${ThumbnailBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${ThumbnailDistribution.Id}"

  # ── SQS (processing queue + dead-letter queue) ────────────────────────────────
  DeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: de-clickbait-dlq
      MessageRetentionPeriod: 1209600   # 14 days — enough time to investigate failures

  ProcessingQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: de-clickbait-queue
      # VisibilityTimeout must be >= worker Lambda timeout so a message isn't
      # re-delivered while the worker is still processing it.
      VisibilityTimeout: 180
      MessageRetentionPeriod: 86400   # 1 day
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt DeadLetterQueue.Arn
        maxReceiveCount: 3   # 3 failures → DLQ for manual inspection

  # ── SQS for thumbnail extraction (separate from titles) ───────────────────────
  # Decoupled from the title queue so the heavy Python/ffmpeg worker can fail,
  # retry, and back up independently of the lean title path.
  ThumbnailDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: de-clickbait-thumb-dlq
      MessageRetentionPeriod: 1209600   # 14 days

  ThumbnailQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: de-clickbait-thumb-queue
      VisibilityTimeout: 180   # >= ThumbnailWorker timeout (120s)
      MessageRetentionPeriod: 86400   # 1 day
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt ThumbnailDeadLetterQueue.Arn
        maxReceiveCount: 3

  # ── Resolver Lambda ───────────────────────────────────────────────────────────
  # Called by the Firefox extension on every feed load.
  # Hit  → returns rewritten title immediately.
  # Miss → marks "pending" in DynamoDB, enqueues videoId to SQS, returns null
  #        (extension shows original title; next load will be a hit).
  ResolverFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: de-clickbait-resolver
      CodeUri: src/resolver/
      Handler: index.handler
      Runtime: nodejs22.x
      Timeout: 10
      MemorySize: 512   # more CPU (Lambda ties CPU to memory) → faster cold start + BatchGetItem; pennies at this volume
      Environment:
        Variables:
          THUMB_QUEUE_URL: !Ref ThumbnailQueue
          FRAME_VERSION: !Ref FrameVersion   # re-enqueue items whose thumbVersion != this (lazy re-extract on view)
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref TitlesTable
        - DynamoDBWritePolicy:
            TableName: !Ref TitlesTable
        - SQSSendMessagePolicy:
            QueueName: !GetAtt ProcessingQueue.QueueName
        - SQSSendMessagePolicy:
            QueueName: !GetAtt ThumbnailQueue.QueueName
      Events:
        GetTitle:
          Type: HttpApi
          Properties:
            ApiId: !Ref TitleApi
            Path: /title/{videoId}
            Method: GET
        PostTitles:
          Type: HttpApi
          Properties:
            ApiId: !Ref TitleApi
            Path: /titles
            Method: POST
        GetStats:
          Type: HttpApi
          Properties:
            ApiId: !Ref TitleApi
            Path: /stats
            Method: GET
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Target: es2022
        Format: cjs
        Minify: false
        Sourcemap: true
        EntryPoints:
          - index.ts
        External:
          - "@aws-sdk/*"   # provided by the Lambda runtime — keeps bundle tiny

  # ── Worker Lambda ─────────────────────────────────────────────────────────────
  # Triggered by SQS. Fetches transcript, rewrites with Gemini Flash-Lite
  # (Haiku fallback on error/safety-empty), writes the result to DynamoDB.
  # BatchSize: 1 keeps things simple and avoids one slow video blocking others.
  WorkerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: de-clickbait-worker
      CodeUri: src/worker/
      Handler: index.handler
      Runtime: nodejs22.x
      Timeout: 120   # transcript fetch + LLM call; well within SQS VisibilityTimeout
      MemorySize: 256
      Policies:
        - DynamoDBWritePolicy:
            TableName: !Ref TitlesTable
        - SQSPollerPolicy:
            QueueName: !GetAtt ProcessingQueue.QueueName
        # Runtime secret fetch (SecureString) — see the header note. The policy template
        # takes the parameter name WITHOUT the leading slash.
        - SSMParameterReadPolicy:
            ParameterName: de-clickbait/transcript-api-key
        - SSMParameterReadPolicy:
            ParameterName: de-clickbait/anthropic-api-key
        - SSMParameterReadPolicy:
            ParameterName: de-clickbait/gemini-api-key
      Environment:
        Variables:
          # Parameter NAMES only — the worker fetches the SecureString values at runtime,
          # so the keys never appear in the Lambda console / GetFunctionConfiguration.
          TRANSCRIPT_API_KEY_PARAM: /de-clickbait/transcript-api-key
          ANTHROPIC_API_KEY_PARAM: /de-clickbait/anthropic-api-key
          GEMINI_API_KEY_PARAM: /de-clickbait/gemini-api-key
      Events:
        SQSTrigger:
          Type: SQS
          Properties:
            Queue: !GetAtt ProcessingQueue.Arn
            BatchSize: 1
            # Explicit cap added 2026-07-08 when the account limit went 10 -> 1000:
            # before that, 10 was the de facto ceiling. Unbounded, a burst would fan
            # out to hundreds of parallel transcript + Anthropic calls and trip their
            # rate limits; 30 keeps bursts quick without hammering upstream APIs.
            ScalingConfig:
              MaximumConcurrency: 30
            FunctionResponseTypes:
              - ReportBatchItemFailures   # only failed records return to queue
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Target: es2022
        Format: cjs
        Minify: false
        Sourcemap: true
        EntryPoints:
          - index.ts
        External:
          - "@aws-sdk/*"   # bundling @anthropic-ai/sdk (not in Lambda runtime)

  # ── Thumbnail Worker Lambda (container image) ─────────────────────────────────
  # Heavy, separate toolchain: Python + yt-dlp + static ffmpeg. Triggered by
  # ThumbnailQueue. Per §7 retest: tv_embedded client exposes DASH <=1080p with
  # downloadable URLs and NO PO token; sticky proxy session (URLs are IP-locked);
  # we Range-fetch only the first ~MB (init+keyframe) and ffmpeg decodes it locally.
  # Length-independent cost. Requires Docker for `sam build`.
  ThumbnailWorkerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: de-clickbait-thumbnail-worker
      PackageType: Image
      Timeout: 120
      MemorySize: 2048
      Environment:
        Variables:
          THUMB_BUCKET: !Ref ThumbnailBucket
          THUMB_CDN_DOMAIN: !GetAtt ThumbnailDistribution.DomainName   # thumbUrl points here
          PROXY_PARAM: /de-clickbait/proxy-url   # SecureString NAME; worker fetches the value at runtime (sticky -session-<id> appended in code per video)
          YTDLP_PLAYER_CLIENT: "tv_embedded"  # DASH <=1080p with URLs, NO PO token (§7 retest)
          MAX_HEIGHT: "720"                   # 720p is plenty for a feed card; ~half the bytes of 1080p
          FETCH_BYTES: "200000"              # ~0.2MB: §16 floor + HARD CAP on proxy bytes/extraction (no big re-fetch)
          DARK_YAVG: "16"                     # luma below this = near-black; excluded from the tier-A vote (§16)
          THUMB_ENTROPY_MIN: "5.0"           # min frame entropy (bits) to count as "real content" in the vote (§16)
          FRAME_VERSION: !Ref FrameVersion   # v3 entropy-gated blur vote; bump → resolver lazily re-extracts old thumbs
      Policies:
        - DynamoDBWritePolicy:
            TableName: !Ref TitlesTable
        - S3WritePolicy:
            BucketName: !Ref ThumbnailBucket
        - SQSPollerPolicy:
            QueueName: !GetAtt ThumbnailQueue.QueueName
        - SSMParameterReadPolicy:
            ParameterName: de-clickbait/proxy-url
      Events:
        SQSTrigger:
          Type: SQS
          Properties:
            Queue: !GetAtt ThumbnailQueue.Arn
            BatchSize: 1
            # Cap concurrent invokes from the SQS poller. Raised 5 -> 20 on 2026-07-08
            # after the account concurrency quota increase (10 -> 1000) was granted.
            # Proxy is NOT a constraint (Decodo allows unlimited concurrent sessions;
            # each invoke uses its own sticky session = distinct exit IP). 20 clears a
            # typical page-view burst (~20-30 thumbs) in one or two waves; beyond that
            # is the flat part of the curve, and job time (~10-40s) is the floor.
            ScalingConfig:
              MaximumConcurrency: 20
            FunctionResponseTypes:
              - ReportBatchItemFailures
    Metadata:
      Dockerfile: Dockerfile
      DockerContext: src/thumbnail-worker
      DockerTag: latest

Outputs:
  ApiEndpoint:
    Description: HTTP API base URL — paste this into the Firefox extension config
    Value: !Sub "https://${TitleApi}.execute-api.${AWS::Region}.amazonaws.com"
  TableName:
    Value: !Ref TitlesTable
  ThumbnailBucketName:
    Description: S3 bucket holding extracted thumbnail frames
    Value: !Ref ThumbnailBucket
  ThumbnailCdnDomain:
    Description: CloudFront domain serving thumbnails (thumbUrl = https://<this>/<videoId>.jpg)
    Value: !GetAtt ThumbnailDistribution.DomainName
  QueueUrl:
    Value: !Ref ProcessingQueue
  DeadLetterQueueUrl:
    Value: !Ref DeadLetterQueue
  ThumbnailQueueUrl:
    Description: Drop a {"videoId":"..."} message here to manually test extraction
    Value: !Ref ThumbnailQueue
  ThumbnailDeadLetterQueueUrl:
    Value: !Ref ThumbnailDeadLetterQueue
