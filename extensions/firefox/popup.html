<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0; width: 260px;
      font: 13px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: #0f0f0f; color: #f1f1f1;
    }
    header {
      display: flex; align-items: center; gap: 8px;
      padding: 14px 16px 10px; border-bottom: 1px solid #272727;
    }
    header .dot { width: 9px; height: 9px; border-radius: 50%; background: #ff2f91; box-shadow: 0 0 6px #ff2f91aa; }
    header h1 { margin: 0; font-size: 14px; font-weight: 600; }
    .rows { padding: 6px 4px 10px; }
    .row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 11px 14px; border-radius: 8px; cursor: pointer; user-select: none;
    }
    .row:hover { background: #1c1c1c; }
    .row .label { font-size: 13px; }
    .row .sub { display: block; color: #9a9a9a; font-size: 11px; margin-top: 2px; }
    /* toggle switch */
    .switch { position: relative; width: 38px; height: 22px; flex: 0 0 auto; }
    .switch input { position: absolute; opacity: 0; width: 100%; height: 100%; margin: 0; cursor: pointer; }
    .track {
      position: absolute; inset: 0; background: #4d4d4d; border-radius: 999px;
      transition: background .18s ease;
    }
    .track::after {
      content: ""; position: absolute; top: 3px; left: 3px; width: 16px; height: 16px;
      background: #fff; border-radius: 50%; transition: transform .18s ease;
    }
    .switch input:checked + .track { background: #3ea6ff; }
    .switch input:checked + .track::after { transform: translateX(16px); }
    footer { padding: 8px 16px 12px; color: #6f6f6f; font-size: 10.5px; text-align: center; }
  </style>
</head>
<body>
  <header><span class="dot"></span><h1>De-Clickbait</h1></header>
  <div class="rows">
    <label class="row" for="titles">
      <span class="label">Replace titles<span class="sub">Swap clickbait titles for cleaned ones</span></span>
      <span class="switch"><input type="checkbox" id="titles" checked><span class="track"></span></span>
    </label>
    <label class="row" for="thumbs">
      <span class="label">Replace thumbnails<span class="sub">Use a real frame instead of the thumbnail</span></span>
      <span class="switch"><input type="checkbox" id="thumbs" checked><span class="track"></span></span>
    </label>
    <label class="row" for="hideShorts">
      <span class="label">Hide Shorts<span class="sub">Remove Shorts shelves &amp; recommendations</span></span>
      <span class="switch"><input type="checkbox" id="hideShorts" checked><span class="track"></span></span>
    </label>
  </div>
  <footer>Changes apply instantly — no page reload</footer>
  <script src="popup.js"></script>
</body>
</html>
